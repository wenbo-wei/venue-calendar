name: Refresh and deploy Venue Calendar

on:
  push:
    branches: [main]
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  refresh-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install refresh dependencies
        run: python -m pip install -r requirements.txt
      - name: Test refresh rules
        run: python -m unittest discover -s tests -v
      - name: Refresh from official conference websites
        run: python scripts/refresh_official.py
      - name: Save refreshed data
        run: |
          if jq -e '.changed == true' data/refresh_state.json >/dev/null &&
             ! git diff --quiet -- data/conferences.js data/refresh_state.json; then
            git config user.name "venue-calendar-bot"
            git config user.email "actions@users.noreply.github.com"
            git add data/conferences.js data/refresh_state.json
            git commit -m "Refresh verified conference data"
            git push
          fi
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
